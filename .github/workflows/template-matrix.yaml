name: Template Matrix Validation

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: template-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generated-project-typecheck:
    name: Typecheck ${{ matrix.preset }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        preset:
          - t3
          - tanstack-fullstack
          - react-hono
          - sveltekit
          - astro-sanity
          - nuxt-fullstack
          - rust-axum-seaorm
          - rust-actix-sqlx
          - go-gin-gorm
          - go-echo-sqlc
          - python-fastapi-sqlalchemy
          - python-django-langchain
          - java-spring-maven
          - java-spring-gradle-jpa
          - java-plain-cli
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Setup Rust
        if: startsWith(matrix.preset, 'rust-')
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        if: startsWith(matrix.preset, 'go-')
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Python + uv
        if: startsWith(matrix.preset, 'python-')
        uses: astral-sh/setup-uv@v5

      - name: Setup Java
        if: startsWith(matrix.preset, 'java-')
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: matrix-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            matrix-${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Core Packages
        run: |
          bun run --cwd packages/types build
          bun run --cwd packages/template-generator build
          bun run --cwd apps/cli build

      - name: Run Generated Project Verification
        run: bun run test:smoke -- --preset ${{ matrix.preset }} --output testing/.smoke-output/${{ matrix.preset }}

      - name: Upload Smoke Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ matrix.preset }}
          path: testing/.smoke-output/${{ matrix.preset }}
          include-hidden-files: true
          if-no-files-found: ignore
