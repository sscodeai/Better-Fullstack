name: Smoke Test

on:
  push:
    branches: [main]
    paths:
      - "packages/types/**"
      - "packages/template-generator/**"
      - "apps/cli/src/**"
      - "testing/**"
      - ".github/workflows/smoke-test.yaml"
  pull_request:
    paths:
      - "packages/types/**"
      - "packages/template-generator/**"
      - "apps/cli/src/**"
      - "testing/**"
      - ".github/workflows/smoke-test.yaml"
  schedule:
    - cron: "0 3 * * *" # Nightly at 3am UTC
  workflow_dispatch:
    inputs:
      seed:
        description: "PRNG seed override (default: commit SHA)"
        required: false
        type: string
      ecosystem:
        description: "Single ecosystem to test (leave empty for all)"
        required: false
        type: choice
        options:
          - ""
          - typescript
          - rust
          - python
          - go
          - java
          - react-native
          - elixir
      count:
        description: "Number of combos to generate"
        required: false
        type: number
        default: 14

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python + uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Cache Dependencies
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: smoke-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            smoke-${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Packages
        run: |
          cd packages/types && bun run build
          cd ../template-generator && bun run build
          cd ../../apps/cli && bun run build

      - name: Detect changed schemas for PR-aware testing
        id: detect-changes
        if: github.event_name == 'pull_request'
        run: |
          FORCE_FLAGS=""

          # Get files changed in this PR
          CHANGED=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path' 2>/dev/null || true)

          # Detect new options added to schemas.ts
          if echo "$CHANGED" | grep -q "packages/types/src/schemas.ts"; then
            DIFF=$(gh pr diff ${{ github.event.pull_request.number }} -- packages/types/src/schemas.ts 2>/dev/null || true)

            # Extract newly added enum values from the diff (lines starting with +)
            # Pattern: look for added lines containing quoted strings in enum arrays
            NEW_VALUES=$(echo "$DIFF" | grep '^+' | grep -oP '"\K[a-z0-9-]+(?=")' | grep -v "none" | sort -u || true)

            if [ -n "$NEW_VALUES" ]; then
              # Force the first new value found (most PRs add one tool)
              FIRST_NEW=$(echo "$NEW_VALUES" | head -1)
              echo "Detected new schema value: $FIRST_NEW"

              # Try to find which category it belongs to by checking the surrounding context
              CATEGORY=$(echo "$DIFF" | grep -B 20 "\"$FIRST_NEW\"" | grep -oP '(?<=export const )\w+Schema' | tail -1 | sed 's/Schema$//' | sed 's/\([A-Z]\)/-\1/g' | sed 's/^-//' | tr '[:upper:]' '[:lower:]' || true)

              if [ -n "$CATEGORY" ]; then
                FORCE_FLAGS="--force-option $CATEGORY=$FIRST_NEW"
                echo "Will force: $FORCE_FLAGS"
              fi
            fi
          fi

          echo "force_flags=$FORCE_FLAGS" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Smoke Tests
        env:
          INPUT_SEED: ${{ inputs.seed }}
          FALLBACK_SEED: ${{ github.sha }}
          SMOKE_ECOSYSTEM: ${{ inputs.ecosystem }}
          SMOKE_COUNT: ${{ inputs.count || '14' }}
          FORCE_FLAGS: ${{ steps.detect-changes.outputs.force_flags }}
        run: |
          SEED="${INPUT_SEED:-$FALLBACK_SEED}"

          ECOSYSTEM_FLAG=""
          if [ -n "$SMOKE_ECOSYSTEM" ]; then
            ECOSYSTEM_FLAG="--ecosystem $SMOKE_ECOSYSTEM"
          fi

          bun run testing/smoke-test.ts \
            --seed "$SEED" \
            --count "$SMOKE_COUNT" \
            $ECOSYSTEM_FLAG \
            $FORCE_FLAGS \
            --output testing/.smoke-output

      - name: Post Step Summary
        if: always()
        run: |
          if [ -f testing/.smoke-output/summary.md ]; then
            cat testing/.smoke-output/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: testing/.smoke-output/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7
