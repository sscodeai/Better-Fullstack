name: E2E & Integration Tests

on:
  pull_request:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run CLI runtime and roundtrip tests"
        type: boolean
        default: true
      run_smoke_strict:
        description: "Run strict smoke tests (dev-check blocking)"
        type: boolean
        default: true
      run_playwright:
        description: "Run Playwright web builder tests"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-runtime:
    name: E2E Runtime Tests
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_e2e) }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: astral-sh/setup-uv@v5

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: e2e-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: e2e-${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Packages
        run: |
          bun run --cwd packages/types build
          bun run --cwd packages/template-generator build
          bun run --cwd apps/cli build

      - name: Run E2E Tests
        env:
          E2E: "1"
        run: bun test ./apps/cli/test/e2e/e2e.e2e.ts --timeout 600000

      - name: Upload E2E Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: apps/cli/.smoke-e2e/
          if-no-files-found: warn
          retention-days: 7

  smoke-strict-core:
    name: Strict Smoke Tests (Core)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_smoke_strict }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: astral-sh/setup-uv@v5

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: smoke-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: smoke-${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Packages
        run: |
          bun run --cwd packages/types build
          bun run --cwd packages/template-generator build
          bun run --cwd apps/cli build

      - name: Run Strict Smoke Tests (Core)
        run: |
          bun run testing/smoke-test.ts \
            --preset pr-core \
            --dev-check \
            --strict \
            --output testing/.smoke-output/core

      - name: Post Summary
        if: always()
        run: |
          if [ -f testing/.smoke-output/core/summary.md ]; then
            cat testing/.smoke-output/core/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-strict-core-results
          path: testing/.smoke-output/core/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

  smoke-strict-broad:
    name: Strict Smoke Tests (Broad)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_smoke_strict }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: astral-sh/setup-uv@v5

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: smoke-broad-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: smoke-broad-${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Packages
        run: |
          bun run --cwd packages/types build
          bun run --cwd packages/template-generator build
          bun run --cwd apps/cli build

      - name: Run Strict Smoke Tests (Broad)
        run: |
          bun run testing/smoke-test.ts \
            --preset pr-broad \
            --dev-check \
            --strict \
            --output testing/.smoke-output/broad

      - name: Post Summary
        if: always()
        run: |
          if [ -f testing/.smoke-output/broad/summary.md ]; then
            cat testing/.smoke-output/broad/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-strict-broad-results
          path: testing/.smoke-output/broad/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

  playwright:
    name: Playwright Web Builder Tests
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_playwright }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: pw-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: pw-${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Packages
        run: |
          bun run --cwd packages/types build
          bun run --cwd packages/template-generator build

      - name: Install Playwright Browsers
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright Tests
        working-directory: apps/web
        run: bunx playwright test
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/test-results/
          if-no-files-found: warn
          retention-days: 7

  web-command-roundtrip:
    name: Web Command Roundtrip
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_e2e }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: web-roundtrip-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: web-roundtrip-${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Packages
        run: |
          bun run --cwd packages/types build
          bun run --cwd packages/template-generator build
          bun run --cwd apps/cli build

      - name: Run Web Command Roundtrip Tests
        run: bun test apps/cli/test/e2e/web-command-roundtrip.test.ts --timeout 600000

      - name: Upload Roundtrip Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-command-roundtrip-results
          path: apps/cli/.smoke-web-command-roundtrip/
          if-no-files-found: warn
          retention-days: 7

  package-manager-default-matrix:
    name: Package Manager Default Matrix
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_e2e }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: package-managers-${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: package-managers-${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Enable Corepack Managers
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          corepack prepare yarn@stable --activate

      - name: Build Packages
        run: |
          bun run --cwd packages/types build
          bun run --cwd packages/template-generator build
          bun run --cwd apps/cli build

      - name: Run Package Manager Matrix
        run: bun test apps/cli/test/e2e/default-package-manager-matrix.test.ts --timeout 900000

      - name: Upload Package Manager Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-manager-default-matrix-results
          path: apps/cli/.smoke-default-package-managers/
          if-no-files-found: warn
          retention-days: 7
